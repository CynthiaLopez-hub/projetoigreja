<!DOCTYPE html>
<html lang = "PT-BR">
    <head>
        <meta charset = "UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Login- Assembleia de Deus</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
     <style>
            * {
                box-sizing: border-box;
                font-family: 'Poppins', sans-serif;
            }

            body, html {
                margin: 0;
                height: 100%;
            }
            .tela-login {
                display: flex;
                height: 100vh;
                width: 100%;
            }
            .lado-esquerdo {
                flex: 1;
                background-color: #0a1f3d;
                color: white;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 40px;
                text-align: center;
            }
            .lado-esquerdo img {
                width: 300px;
                border-radius: 15px;
                margin-top: 20px;
                opacity: 0.8;
            }

            .lado-direito {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 40px;
            }

            .logo-texto {
                font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            }
            input {
                width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            }

            button {
            width: 100%;
            padding: 12px;
            background-color: #ff8c00;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            }

            .opcoes {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin: 10px 0;
            }

            .opcoes label {
            display: flex;
            align-items: center;
            gap: 5px;
            }

            .container-form {
            width: 100%;
            max-width: 350px;
            }

            input:focus {
            outline: none;
            border-color: #ff8c00;
            }

            button:hover {
            background-color: #e67e00;
            }

            .cadastro {
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            }

        @media (max-width: 480px) {
            .container-form {
                max-width: 100%;
            }
        }

        @media (max-width: 768px) {
            .tela-login {flex-direction: column;}
            .lado-esquerdo {display:none;}
        }

     </style>
    </head>
    <body>
        <header>
            <h2> Bem-vindo!</h2>
        </header>
        <div class = "tela-login">
        <div class = "lado-esquerdo">
        <div class = "logo-texto"> <i class = "bi bi-fire"></i>ASSEMBLEIA DE DEUS

      </div>
        <p> Conecte-se para ver  os eventos e atividades da nossa igreja</p>
        <img src="igreja.jpeg" alt="Igreja">
        </div>
        <div class = "lado-direito">
        <div class = "container-form">
            <h2> Acesse sua conta</h2>
            <form>
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com" required>

                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha" required>

                <div class="opcoes">
                    <label><input type="checkbox"> Lembrar-me</label>
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit">Entrar</button>

                <p class="cadastro">
                    Não tem uma conta? 
                    <a href="#">Cadastre-se</a>
                </p>
            </form>

        </div>
            </div>
        </div>

    </div>
    <footer> 
        <p>&copy; 2026 Assembleia de Deus. Todos os direitos reservados.</p>
    </footer>
    </body>
    </html>
