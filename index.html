<!DOCTYPE html>
 <html lang = "PT-BR">
    <head>
        <meta charset = "UTF-8">
        <title> Login-Assembleia de Deus</title>
        <style>
           body {
              font-family: 'Poppins', sans-serif;
              background-color: whitesmoke;
              display: flex;
              justify-content: center;
              align-items: center;
              height: 100vh;
              margin: 0;
           }

           .cartao-login { 
                background-color: white;
                padding: 40px;
                border-radius: 15px;
                box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
                width: 350px;
                text-align: center;
               
           }
            .bi-fire { 
                color: #ff8c00;
                margin-right: 8px;
                font-size: 1.2em;
            }


           .logo {
            color: #d35400;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
           }
            
            .logo{
                 display: flex;
                 align-items: center;
                 justify-content: center;
            }
           input {
             width: 100%;
             padding: 10px;
             margin: 10px 0;
             border-radius: 5px;
             box-sizing: border-box;
           }

             button {
                 width: 100%;
                 padding: 10px;
                 background-color: #ff8c00;
                 color: white;
                 border: none;
                 border-radius: 5px;
                 cursor: pointer;
                 font-weight: bold;

             }

             button:hover {
                background-color: #e67e00;
             }
        </style>
    </head>
    <body>
        <div class = "cartao- login">
            <div class="logo"><i class = "bi bi-fire"></i>ASSEMBLEIA DE DEUS</div>
            
         <p> Acesse sua conta</p>
            <form> <input type= "email" placeholder="Email" required>
                    <input type = "password" placeholder = "senha" required>
                    <button type = "submit"> Entrar</button>
            </form>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
            <p style=" font-size: 12px; margin-top: 15px;">
                nao tem uma conta? <a href = "#">registre-se</a>
            </p>
            
        </div>
    </body>
 </html>
